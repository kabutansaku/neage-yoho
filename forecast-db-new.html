<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全品目 値上がり予測DB | 値上がり予測ドットコム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#002B80;--red:#c0392b;--amber:#d97706;--green:#059669;--paper:#fff;--surface:#f8fafc;--border:#e2e8f0;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8}
body{font-family:'Noto Sans JP',sans-serif;background:#f1f5f9;color:var(--t1);font-size:15px;line-height:1.7}
.hdr{background:var(--navy);border-bottom:3px solid #facc15;padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:15px;font-weight:700;color:#fff}.hdr-logo span{color:#facc15}
.hdr-back{margin-left:auto;font-size:12px;color:rgba(255,255,255,.55);text-decoration:none}
.hdr-back:hover{color:#facc15}
.main{max-width:1200px;margin:0 auto;padding:14px 12px}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--t2);margin-bottom:14px;padding:9px 14px;background:var(--paper);border:0.5px solid var(--border);border-radius:8px;flex-wrap:wrap}
.bc-item{color:var(--navy);cursor:pointer;font-weight:500}.bc-item:hover{text-decoration:underline}
.bc-sep{color:var(--t3)}.bc-cur{color:var(--t1);font-weight:700}
.sec-hdr{margin-bottom:12px}
.sec-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.sec-sub{font-size:13px;color:var(--t2)}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:0.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--t1);cursor:pointer;margin-bottom:14px;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.back-btn:hover{border-color:var(--navy);color:var(--navy)}
.fade-in{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ─ LEVEL0 大カテゴリ ─ */
.big-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.big-card{background:var(--paper);border:0.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s}
.big-card:hover{border-color:var(--navy);box-shadow:2px 2px 0 rgba(0,43,128,.12);transform:translate(-1px,-1px)}
.big-card:active{transform:scale(.98)}
.big-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.big-icon{font-size:26px;flex-shrink:0}
.big-name{font-size:14px;font-weight:700;color:var(--t1);line-height:1.3}
.big-count{font-size:11px;color:var(--t2);margin-top:2px}
.rise-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.rise-lbl{font-size:10px;color:var(--t2)}
.rise-max{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
.rbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:7px}
.rbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.risk-row{display:flex;align-items:center;gap:5px}
.rbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.rb-h{background:#fee2e2;color:#991b1b}.rb-m{background:#fef3c7;color:#92400e}.rb-l{background:#f0fdf4;color:#166534}
.arr{margin-left:auto;font-size:14px;color:var(--t3)}

/* ─ LEVEL1 中カテゴリ ─ */
.mid-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mid-card{background:var(--paper);border:0.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s}
.mid-card:hover{border-color:var(--navy);box-shadow:2px 2px 0 rgba(0,43,128,.12);transform:translate(-1px,-1px)}
.mid-card:active{transform:scale(.98)}
.mid-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.mid-icon{font-size:22px;flex-shrink:0}
.mid-name{font-size:15px;font-weight:700;color:var(--t1);line-height:1.3}
.mid-count{font-size:11px;color:var(--t2)}
.mid-preview{font-size:11px;color:var(--t2);margin-top:7px;line-height:1.6}
.mid-preview span{display:inline-block;background:var(--surface);border-radius:4px;padding:1px 7px;margin:2px 3px 0 0}

/* ─ LEVEL2 商品リスト ─ */
.product-list{display:flex;flex-direction:column;gap:12px}
.product-card{background:var(--paper);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.pc-head{padding:14px 16px 12px;border-bottom:0.5px solid var(--border)}
.pc-name{font-size:15px;font-weight:700;margin-bottom:5px}
.pc-sub{font-size:12px;color:var(--t2);margin-bottom:10px}
.pc-bars{display:flex;flex-direction:column;gap:5px}
.pc-bar-row{display:flex;align-items:center;gap:8px}
.pc-bar-lbl{font-size:11px;color:var(--t2);width:52px;flex-shrink:0}
.pc-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.pc-bar-fill{height:100%;border-radius:4px}
.pc-bar-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;width:52px;text-align:right;flex-shrink:0}
.pc-shops{background:var(--surface);border-top:0.5px solid var(--border)}
.shop-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s}
.shop-row:last-child{border-bottom:none}
.shop-row:hover{background:#eff6ff}
.shop-row.cheapest{background:#f0fdf4}
.slogo{width:82px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.sicon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.si-r{background:#BF0000}.si-y{background:#FF0033}.si-a{background:#FF9900;color:#232f3e}
.snm{font-size:12px;color:var(--t2)}
.price-area{flex:1;display:flex;align-items:baseline;gap:4px}
.sprice{font-size:18px;font-weight:500;font-variant-numeric:tabular-nums}
.sprice.best{color:#166534;font-weight:700}
.stax{font-size:11px;color:var(--t3)}
.cbadge{font-size:9px;font-weight:700;color:#166534;background:#bbf7d0;padding:1px 7px;border-radius:3px}
.spts{font-size:11px;color:var(--t2);min-width:80px}
.pts-v{color:#BF0000;font-weight:500}
.sdel{font-size:11px;color:var(--t3);min-width:64px;text-align:right}
.buy-btn{background:var(--navy);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;transition:background .15s}
.buy-btn:hover{background:#003399}
.pr-note{font-size:10px;color:var(--t3);text-align:right;padding:7px 16px;background:var(--surface);border-top:0.5px solid var(--border)}

@media(max-width:768px){
  .big-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .big-card{padding:12px}
  .big-icon{font-size:22px}
  .big-name{font-size:13px}
}
@media(max-width:520px){
  .big-grid{grid-template-columns:repeat(2,1fr)}
  .mid-grid{grid-template-columns:1fr}
  .spts,.sdel{display:none}
  .sprice{font-size:16px}
  .main{padding:10px 8px}
}
</style>
</head>
<body>
<header class="hdr">
  <a href="index.html" class="hdr-logo" style="text-decoration:none;color:inherit"><span>値上がり</span>予測ドットコム</a>
  <a class="hdr-back" href="index.html" style="background:#002B80;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap">🏠 トップへ</a>
</header>
<div class="main">
  <div class="breadcrumb" id="bc"><span class="bc-cur">すべてのカテゴリ</span></div>
  <div id="content"></div>
</div>
<script>
var CATS=[];

// ── 予測エンジン（数学的ロジック）──
function linearReg(pts){
  var n=pts.length; if(n<2) return {a:0,b:0,r2:0};
  var sx=0,sy=0,sxy=0,sx2=0;
  pts.forEach(function(p){sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sx2+=p.x*p.x;});
  var b=(n*sxy-sx*sy)/(n*sx2-sx*sx||1);
  var a=(sy-b*sx)/n;
  var my=sy/n,st=0,sr=0;
  pts.forEach(function(p){st+=Math.pow(p.y-my,2);sr+=Math.pow(p.y-(a+b*p.x),2);});
  return {a:a,b:b,r2:st>0?1-sr/st:0};
}
function expReg(pts){
  var vp=pts.filter(function(p){return p.y>0;});
  if(vp.length<2) return null;
  var lp=vp.map(function(p){return{x:p.x,y:Math.log(p.y)};});
  var l=linearReg(lp);
  return {a:Math.exp(l.a),b:l.b,r2:l.r2};
}
function predictRate(r2v,r3v,r4v,months){
  var pts=[{x:0,y:0},{x:2,y:r2v||0},{x:3,y:r3v||0},{x:4,y:r4v||0}].filter(function(p){return p.y>=0;});
  var lin=linearReg(pts);
  var exp2=expReg(pts.filter(function(p){return p.y>0;}));
  var useExp=exp2&&exp2.r2>lin.r2&&r4v>3;
  var val=useExp?(exp2.a*Math.exp(exp2.b*months)-exp2.a):(lin.a+lin.b*months);
  return Math.max(0,Math.round(val*10)/10);
}
function accelLabel(r2v,r3v,r4v){
  var d1=(r3v||0)-(r2v||0), d2=(r4v||0)-(r3v||0), acc=d2-d1;
  if(acc>1.5&&r4v>=15) return {t:'🚨急騰',c:'#dc2626'};
  if(acc>1.5)           return {t:'🔴加速',c:'#ef4444'};
  if(acc<-1.5&&r4v<5)  return {t:'✅沈静',c:'#059669'};
  if(acc<-1.5)          return {t:'🟢鈍化',c:'#16a34a'};
  return {t:'🟡安定',c:'#d97706'};
}
function avgR4Items(items){
  var v=items.filter(function(i){return i.r4>0;}).map(function(i){return i.r4;});
  return v.length?Math.round(v.reduce(function(a,b){return a+b;})/v.length*10)/10:0;
}
function avgR4Sub(sub){
  var all=[];
  (sub.items||[]).forEach(function(i){if(i.r4>0)all.push(i.r4);});
  return all.length?Math.round(all.reduce(function(a,b){return a+b;})/all.length*10)/10:0;
}
function avgR4Mid(mid){
  var all=[];
  (mid.sub||[]).forEach(function(s){(s.items||[]).forEach(function(i){if(i.r4>0)all.push(i.r4);});});
  return all.length?Math.round(all.reduce(function(a,b){return a+b;})/all.length*10)/10:0;
}
function avgR2R3R4Mid(mid){
  var a2=[],a3=[],a4=[];
  (mid.sub||[]).forEach(function(s){(s.items||[]).forEach(function(i){
    if(i.r2>0)a2.push(i.r2);if(i.r3>0)a3.push(i.r3);if(i.r4>0)a4.push(i.r4);
  });});
  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;})/a.length:0;};
  return {r2:avg(a2),r3:avg(a3),r4:avg(a4)};
}
function avgR2R3R4Cat(cat){
  var a2=[],a3=[],a4=[];
  (cat.mid||[]).forEach(function(m){(m.sub||[]).forEach(function(s){(s.items||[]).forEach(function(i){
    if(i.r2>0)a2.push(i.r2);if(i.r3>0)a3.push(i.r3);if(i.r4>0)a4.push(i.r4);
  });});});
  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;})/a.length:0;};
  return {r2:avg(a2),r3:avg(a3),r4:avg(a4)};
}




// ══════ ヘルパー ══════
const RL={h:'高リスク',m:'中リスク',l:'低リスク'};
const RC={h:'rb-h',m:'rb-m',l:'rb-l'};
const SIC={r:'si-r',y:'si-y',a:'si-a'};
const SLB={r:'R',y:'Y',a:'A'};
function maxR4sub(s){return Math.max(...s.items.map(i=>i.r4));}
function maxR4mid(m){return Math.max(...m.sub.flatMap(s=>s.items.map(i=>i.r4)));}
function maxR4cat(c){return Math.max(...c.mid.flatMap(m=>m.sub.flatMap(s=>s.items.map(i=>i.r4))));}
function bc(v){if(v<=0)return'#059669';if(v>=15)return'#9b1c1c';if(v>=10)return'#c0392b';if(v>=7)return'#d97706';return'#16a34a';}

let lv=0,selCat=null,selMid=null,selSub=null;

function updateBC(){
  let h='<a href="index.html#forecast-db" class="bc-item" style="text-decoration:none;color:var(--navy);font-weight:600">← トップ</a>';
  if(lv>=1&&selCat){
    h+='<span class="bc-sep">›</span>';
    h+=lv===1?`<span class="bc-cur">${selCat.icon} ${selCat.name}</span>`:`<span class="bc-item" onclick="go1()">${selCat.icon} ${selCat.name}</span>`;
  }
  if(lv>=2&&selMid){
    h+='<span class="bc-sep">›</span>';
    h+=lv===2?`<span class="bc-cur">${selMid.icon} ${selMid.name}</span>`:`<span class="bc-item" onclick="go2()">${selMid.icon} ${selMid.name}</span>`;
  }
  if(lv===3&&selSub)h+=`<span class="bc-sep">›</span><span class="bc-cur">${selSub.icon} ${selSub.name}</span>`;
  document.getElementById('bc').innerHTML=h;
}

// ══════ LEVEL 0: 大カテゴリ ══════
function go0(){
  // このページはcatパラメータ必須のため使用しない
  window.location.replace('index.html');
}

// ══════ LEVEL 1: 中カテゴリ ══════
function go1(id){
  if(id)selCat=CATS.find(c=>c.id===id);
  lv=1;selMid=null;selSub=null;updateBC();
  const c=selCat;
  document.getElementById('content').innerHTML=`
    <a href="index.html#forecast-db" class="back-btn fade-in" style="display:inline-block;text-decoration:none">🏠 カテゴリ一覧</a>
    <div class="sec-hdr fade-in"><div class="sec-title">${c.icon} ${c.name}</div>
    <div class="sec-sub">中項目を選ぶと小項目・商品の詳細が表示されます</div></div>
    <div class="mid-grid fade-in" id="mg"></div>`;
  document.getElementById('mg').innerHTML=c.mid.map(m=>{
    const mv=maxR4mid(m),pct=Math.min(100,mv/28*100);
    const subNames=m.sub.slice(0,4).map(s=>`<span>${s.name.slice(0,8)}</span>`).join('');
    const mStats=avgR2R3R4Mid(m);
    const mAvg=Math.round(mStats.r4*10)/10;
    const mM12=predictRate(mStats.r2,mStats.r3,mStats.r4,12);
    const mAcc=accelLabel(mStats.r2,mStats.r3,mStats.r4);
    return`<div class="mid-card" onclick="go2('${m.id}')">
      <div class="mid-top"><span class="mid-icon">${m.icon}</span>
        <div><div class="mid-name">${m.name}</div>
        <div class="mid-count">${m.sub.length}小カテゴリ</div></div>
      </div>
      <div class="rise-row"><span class="rise-lbl">最大値上がり（4ヶ月後）</span>
        <span class="rise-max" style="color:${bc(mv)}">${mv>0?'+'+mv+'%':'対象外'}</span></div>
      <div class="rbar"><div class="rbar-fill" style="width:${pct.toFixed(0)}%;background:${bc(mv)}"></div></div>
      <div class="risk-row"><span class="rbadge ${RC[m.risk]}">${RL[m.risk]}</span><span class="arr">›</span></div>
      <div class="mid-preview">${subNames}</div>
    </div>`;
  }).join('');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════ LEVEL 2: 小カテゴリ ══════
function go2(id){
  if(id)selMid=selCat.mid.find(m=>m.id===id);
  lv=2;selSub=null;updateBC();
  const m=selMid;
  document.getElementById('content').innerHTML=`
    <button class="back-btn fade-in" onclick="go1()">← ${selCat.icon} ${selCat.name}</button>
    <div class="sec-hdr fade-in"><div class="sec-title">${m.icon} ${m.name}</div>
    <div class="sec-sub">小項目を選ぶと商品の詳細予測と最安値比較が表示されます</div></div>
    <div class="mid-grid fade-in" id="sg"></div>`;
  document.getElementById('sg').innerHTML=m.sub.map(s=>{
    const mv=maxR4sub(s),pct=Math.min(100,mv/28*100);
    const prev=s.items.slice(0,3).map(i=>`<span>${i.n.split('（')[0].slice(0,10)}</span>`).join('');
    return`<div class="mid-card" onclick="go3('${s.id}')">
      <div class="mid-top"><span class="mid-icon">${s.icon}</span>
        <div><div class="mid-name">${s.name}</div>
        <div class="mid-count">${s.items.length}品目</div></div>
      </div>
      <div class="rise-row"><span class="rise-lbl">最大値上がり（4ヶ月後）</span>
        <span class="rise-max" style="color:${bc(mv)}">${mv>0?'+'+mv+'%':'対象外'}</span></div>
      <div class="rbar"><div class="rbar-fill" style="width:${pct.toFixed(0)}%;background:${bc(mv)}"></div></div>
      <div class="risk-row"><span class="rbadge ${RC[s.risk]}">${RL[s.risk]}</span><span class="arr">›</span></div>
      <div class="mid-preview">${prev}</div>
    </div>`;
  }).join('');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════ LEVEL 3: 商品リスト ══════
function go3(id){
  selSub=selMid.sub.find(s=>s.id===id);lv=3;updateBC();
  const s=selSub;
  const mx=28;
  const items=s.items.map(it=>{
    const sorted=[...it.sh].sort((a,b)=>a.p-b.p);
    const shops=sorted.map((sh,i)=>{
      const cheap=i===0&&sh.p>0;
      return`<div class="shop-row${cheap?' cheapest':''}" onclick="doAff('${sh.nm}','${it.n}')">
        <div class="slogo"><div class="sicon ${SIC[sh.id]||'si-a'}">${SLB[sh.id]||'S'}</div><span class="snm">${sh.nm}</span></div>
        <div class="price-area">
          <span class="sprice${cheap?' best':''}">${sh.p>0?'¥'+sh.p.toLocaleString():sh.pt||'確認'}</span>
          ${sh.p>0?'<span class="stax">税込</span>':''}
          ${cheap?'<span class="cbadge">最安値</span>':''}
        </div>
        <div class="spts">${sh.pt&&sh.pt!=='—'?`<span class="pts-v">${sh.pt}</span>`:''}</div>
        <button class="buy-btn" onclick="event.stopPropagation();doAff('${sh.nm}','${it.n}')">${sh.p>0?'購入 →':'確認 →'}</button>
      </div>`;
    }).join('');
    return`<div class="product-card">
      <div class="pc-head">
        <div class="pc-name">${it.n}</div>
        <div class="pc-sub">${it.s}</div>
        <div class="pc-bars">
          ${it.r2>0?`<div class="pc-bar-row"><span class="pc-bar-lbl">2ヶ月後</span><div class="pc-bar"><div class="pc-bar-fill" style="width:${it.r2/mx*100}%;background:${bc(it.r2)}"></div></div><span class="pc-bar-val" style="color:${bc(it.r2)}">+${it.r2}%</span></div>`:''}
          ${it.r3>0?`<div class="pc-bar-row"><span class="pc-bar-lbl">3ヶ月後</span><div class="pc-bar"><div class="pc-bar-fill" style="width:${it.r3/mx*100}%;background:${bc(it.r3)}"></div></div><span class="pc-bar-val" style="color:${bc(it.r3)}">+${it.r3}%</span></div>`:''}
          ${it.r4>0?`<div class="pc-bar-row"><span class="pc-bar-lbl">4ヶ月後</span><div class="pc-bar"><div class="pc-bar-fill" style="width:${it.r4/mx*100}%;background:${bc(it.r4)}"></div></div><span class="pc-bar-val" style="color:${bc(it.r4)};font-size:15px;font-weight:700">+${it.r4}%</span></div>`:''}
          ${it.r4===0?'<div style="font-size:12px;color:var(--t2);padding:4px 0">※ このカテゴリは値上がり予測より価格比較が主な目的です</div>':''}
        </div>
      </div>
      <div class="pc-shops">${shops}</div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <button class="back-btn fade-in" onclick="go2()">${selMid.icon} ${selMid.name}に戻る</button>
    <div class="sec-hdr fade-in"><div class="sec-title">${s.icon} ${s.name}</div>
    <div class="sec-sub">値上がり予測と楽天・Yahoo!・Amazonの最安値を同時確認</div></div>
    <div class="product-list fade-in">${items}</div>
    <div class="pr-note" style="margin-top:8px">PR：当サイトはアフィリエイトプログラムに参加しています。</div>`;
  window.scrollTo({top:0,behavior:'smooth'});

// ── 分割CATSファイル非同期読み込み ──
async function loadAllCats(){
  if(typeof CATS!=='undefined'&&CATS&&CATS.length>=30){return;}
  var groups=['food','digital','life','energy','outdoor','money','culture'];
  var all=[];
  for(var i=0;i<groups.length;i++){
    var g=groups[i];
    try{
      var r=await fetch('cats-'+g+'.js');
      var js=await r.text();
      var p=js.indexOf('=[');
      if(p<0)continue;
      var tail=js.slice(p+1).trim();
      if(tail[tail.length-1]===';')tail=tail.slice(0,-1).trim();
      var cats=JSON.parse(tail);
      for(var j=0;j<cats.length;j++)all.push(cats[j]);
    }catch(e){console.error('cats-'+g+'.js:',e);}
  }
  if(all.length>0){
    CATS.length=0;
    for(var k=0;k<all.length;k++)CATS.push(all[k]);
  }
}
document.addEventListener('DOMContentLoaded', function(){
  var params = new URLSearchParams(location.search);
  var catId = params.get('cat');

  if(!catId){
    // catなし → index.htmlのforecast-dbセクションへ戻る
    window.location.replace('index.html#forecast-db');
    return;
  }

  // ローディング表示
  document.getElementById('content').innerHTML =
    '<div style="text-align:center;padding:60px;color:#64748b">📊 データ読み込み中...</div>';

  // cats-*.jsを順次fetch
  var groups = ['food','digital','life','energy','outdoor','money','culture'];
  var all = [];
  var loaded = 0;

  groups.forEach(function(g){
    fetch('cats-'+g+'.js')
      .then(function(r){ return r.text(); })
      .then(function(js){
        var p = js.indexOf('=[');
        if(p >= 0){
          var tail = js.slice(p+1).trim();
          if(tail[tail.length-1]===';') tail = tail.slice(0,-1);
          try{
            JSON.parse(tail).forEach(function(cat){ all.push(cat); });
          }catch(e){}
        }
        loaded++;
        if(loaded === groups.length){
          // 全部読み込み完了
          CATS.length = 0;
          all.forEach(function(cat){ CATS.push(cat); });
          go1(catId);
        }
      })
      .catch(function(){
        loaded++;
        if(loaded === groups.length && all.length > 0){
          CATS.length = 0;
          all.forEach(function(cat){ CATS.push(cat); });
          go1(catId);
        }
      });
  });
});
