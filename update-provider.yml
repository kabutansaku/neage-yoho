name: プロバイダキャンペーン自動更新

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月1日 朝9時(JST)
  workflow_dispatch:

jobs:
  update-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: プロバイダデータ自動更新
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, datetime, os

          today = datetime.date.today()
          year = today.year
          month = today.month
          date_str = "{0}年{1}月".format(year, month)

          prompt = (
            "あなたは日本の光回線・インターネットプロバイダの専門家です。\n"
            + date_str + "時点の最新情報をもとに、以下のプロバイダのキャンペーン情報を更新してください。\n\n"
            "対象プロバイダ：NURO光、auひかり、ドコモ光、GMOとくとくBB光、ソフトバンク光、楽天ひかり、ビッグローブ光\n\n"
            "各プロバイダについて以下の情報をJSON形式で返してください：\n"
            "- cb_kodate: 戸建てキャッシュバック最大額（数値、円）\n"
            "- cb_mansion: マンションキャッシュバック最大額（数値、円）\n"
            "- campaign: キャンペーン内容リスト（文字列の配列、最大5件）\n"
            "- campaign_expire: キャンペーン期限\n\n"
            "以下のJSON形式のみで出力（前後にテキスト不要）：\n"
            '{"updated":"' + date_str + '","providers":{'
            '"nuro":{"cb_kodate":90000,"cb_mansion":60000,"campaign":["例1","例2"],"expire":"期限"},'
            '"au":{"cb_kodate":93000,"cb_mansion":50000,"campaign":["例1"],"expire":"期限"},'
            '"docomo":{"cb_kodate":80000,"cb_mansion":60000,"campaign":["例1"],"expire":"期限"},'
            '"gmo":{"cb_kodate":60000,"cb_mansion":45000,"campaign":["例1"],"expire":"期限"},'
            '"softbank":{"cb_kodate":40000,"cb_mansion":30000,"campaign":["例1"],"expire":"期限"},'
            '"rakuten":{"cb_kodate":63360,"cb_mansion":50160,"campaign":["例1"],"expire":"期限"},'
            '"biglobe":{"cb_kodate":85000,"cb_mansion":85000,"campaign":["例1"],"expire":"期限"}'
            "}}"
          )

          api_key = os.environ.get("ANTHROPIC_API_KEY","")
          if not api_key:
              print("ANTHROPIC_API_KEY not set")
              exit(1)

          payload = json.dumps({
              "model":"claude-sonnet-4-20250514",
              "max_tokens":2000,
              "messages":[{"role":"user","content":prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={"x-api-key":api_key,"anthropic-version":"2023-06-01","content-type":"application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as res:
                  data = json.loads(res.read())
                  text = data["content"][0]["text"].strip()
                  start = text.find("{")
                  end = text.rfind("}") + 1
                  if start >= 0 and end > start:
                      provider_data = json.loads(text[start:end])
                      with open("provider-data.json","w",encoding="utf-8") as f:
                          json.dump(provider_data, f, ensure_ascii=False, indent=2)
                      print("provider-data.json更新完了:", date_str)
                  else:
                      print("JSONが見つからない")
                      exit(1)
          except Exception as e:
              print("Error:", e)
              exit(1)
          PYEOF

      - name: コミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add provider-data.json
          git diff --staged --quiet || git commit -m "📡 プロバイダキャンペーン自動更新 $(date '+%Y-%m')"
          git push
